<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>HyperMap — Instant World Map Lookup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0f;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    #map {
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
    }

    /* Loading screen */
    #loading {
      position: fixed;
      inset: 0;
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      color: #fff;
      font: 600 15px/1.5 'Inter', system-ui, sans-serif;
      gap: 16px;
      transition: opacity 0.4s ease;
    }
    #loading.fade-out { opacity: 0; pointer-events: none; }
    .loading-logo {
      font-size: 40px;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .loading-sub {
      color: #6b7280;
      font-size: 13px;
      font-weight: 400;
    }
    .loading-bar-wrap {
      width: 160px;
      height: 3px;
      background: #1f1f2e;
      border-radius: 2px;
      overflow: hidden;
    }
    .loading-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    /* Zoom to map canvas cursor */
    .maplibregl-canvas { cursor: crosshair !important; }
  </style>
</head>
<body>
  <!-- Loading overlay -->
  <div id="loading">
    <div class="loading-logo">⚡ HyperMap</div>
    <div class="loading-sub">Loading world data…</div>
    <div class="loading-bar-wrap">
      <div class="loading-bar" id="loading-bar"></div>
    </div>
  </div>

  <!-- Map container -->
  <div id="map"></div>

  <script type="module">
    // Animate loading bar
    const bar = document.getElementById('loading-bar');
    let p = 0;
    const iv = setInterval(() => {
      p = Math.min(p + Math.random() * 8, 90);
      bar.style.width = p + '%';
    }, 120);

    // Remove loading screen once map is interactive
    window.__mapReady = () => {
      clearInterval(iv);
      bar.style.width = '100%';
      setTimeout(() => {
        const el = document.getElementById('loading');
        el.classList.add('fade-out');
        setTimeout(() => el.remove(), 400);
      }, 200);
    };
  </script>

  <script type="module" src="/src/main.js"></script>

  <script type="module">
    // Hook into map load event exposed globally
    // We use a MutationObserver to detect when the map canvas appears
    const obs = new MutationObserver(() => {
      if (document.querySelector('.maplibregl-canvas-container')) {
        obs.disconnect();
        // Give map a moment to render
        setTimeout(() => window.__mapReady?.(), 600);
      }
    });
    obs.observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
